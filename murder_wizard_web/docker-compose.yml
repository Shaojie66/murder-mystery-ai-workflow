version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: murder_wizard_web/Dockerfile.backend
    container_name: murder-wizard-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/murder_wizard_web/backend
      - LLM_PROVIDER=${LLM_PROVIDER:-claude}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      # Persist projects data
      - murder_wizard_data:/root/.murder-wizard
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: murder_wizard_web/frontend/Dockerfile
    container_name: murder-wizard-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  murder_wizard_data:
